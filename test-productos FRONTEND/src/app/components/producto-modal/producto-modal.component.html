<div class="modal-overlay" (click)="cerrar()">
    <div class="modal-container" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <h2>Nuevo Producto</h2>
            <button class="btn-close" (click)="cerrar()">✕</button>
        </div>

        <div class="modal-body">
            @if (error) {
                <div class="alert-error">{{ error }}</div>
            }

            <div class="form-group">
                <label>Código *</label>
                <input type="text" [(ngModel)]="producto.codigo" placeholder="Ej: PRD-001">
            </div>

            <div class="form-group">
                <label>Nombre *</label>
                <input type="text" [(ngModel)]="producto.nombre" placeholder="Nombre del producto">
            </div>

            <div class="form-group">
                <label>Descripción</label>
                <textarea [(ngModel)]="producto.descripcion" rows="3" placeholder="Descripción opcional"></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Precio * (S/)</label>
                    <input type="number" [(ngModel)]="producto.precio" step="0.01" placeholder="0.00">
                </div>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn-cancelar" (click)="cerrar()">Cancelar</button>
            <button class="btn-guardar" (click)="guardar()" [disabled]="loading">
                @if (loading) {
                    <span>Guardando...</span>
                } @else {
                    <span>Guardar Producto</span>
                }
            </button>
        </div>
    </div>
</div>
